services:
  ollama:
    image: ollama/ollama:latest
    container_name: fireform-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - fireform-network
    healthcheck:
      # Fix — curl the Ollama API tags endpoint, "ollama ps" is unreliable as a healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fireform-app
    depends_on:
      ollama:
        condition: service_healthy
    # Fix #224 — expose port so API is reachable at http://localhost:8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      # Fix #118 #116 — correct PYTHONPATH to project root
      - PYTHONPATH=/app
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_TIMEOUT=300
    networks:
      - fireform-network

volumes:
  ollama_data:
    driver: local

networks:
  fireform-network:
    driver: bridge
