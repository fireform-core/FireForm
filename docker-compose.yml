services:
  ollama:
    image: ollama/ollama:latest
    container_name: fireform-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - fireform-network
    # Note: ollama/ollama image does not include curl or wget,
    # so healthcheck is handled at the app level via OLLAMA_TIMEOUT
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fireform-app
    depends_on:
      - ollama
    # Fix #224 — expose port so API is reachable at http://localhost:8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      # Fix #118 #116 — correct PYTHONPATH to project root
      - PYTHONPATH=/app
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_TIMEOUT=300
    networks:
      - fireform-network

volumes:
  ollama_data:
    driver: local

networks:
  fireform-network:
    driver: bridge
